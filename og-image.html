<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap');

  body {
    width: 1200px;
    height: 630px;
    background: #050505;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Grid pattern */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 20%, transparent 100%);
  }

  /* Aurora blobs */
  .blob-1 {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, #00A5CF, transparent);
    filter: blur(100px);
    opacity: 0.15;
    top: -100px;
    left: 100px;
  }
  .blob-2 {
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, #004E64, transparent);
    filter: blur(80px);
    opacity: 0.2;
    bottom: -50px;
    right: 150px;
  }

  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    text-align: center;
  }

  /* Logo */
  .logo {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 72px;
    height: 72px;
    border-radius: 20px;
    border: 2px solid rgba(0,165,207,0.3);
    background: rgba(0,78,100,0.15);
  }
  .logo span {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 36px;
    font-weight: 700;
    color: #00A5CF;
  }

  .name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 64px;
    font-weight: 700;
    color: #e5e5e5;
    letter-spacing: -1px;
  }
  .name .dot {
    color: #00A5CF;
  }

  .tagline {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    color: #00A5CF;
    letter-spacing: 1px;
  }

  .description {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px;
    color: #737373;
    max-width: 700px;
    line-height: 1.5;
  }

  /* Tech pills */
  .pills {
    display: flex;
    gap: 12px;
    margin-top: 8px;
  }
  .pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: #a3a3a3;
    padding: 8px 16px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(17,17,17,0.8);
  }

  /* URL */
  .url {
    position: absolute;
    bottom: 32px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    color: #525252;
    letter-spacing: 0.5px;
  }

  /* Border line */
  .border-line {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, transparent, #00A5CF, #007A8C, #00A5CF, transparent);
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="blob-1"></div>
  <div class="blob-2"></div>

  <div class="content">
    <div class="logo"><span>E</span></div>
    <div class="name">Ezra Brilliant<span class="dot">.</span></div>
    <div class="tagline">// portfolio</div>
    <div class="description">
      Mobile & Web Developer — Building digital solutions<br>
      that bridge technology and business
    </div>
    <div class="pills">
      <span class="pill">React</span>
      <span class="pill">TypeScript</span>
      <span class="pill">Kotlin</span>
      <span class="pill">Node.js</span>
      <span class="pill">Python</span>
    </div>
  </div>

  <div class="url">ezrabrilliant.com</div>
  <div class="border-line"></div>
</body>
</html>
